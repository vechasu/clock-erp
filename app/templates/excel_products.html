<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TTT ERP — Товары</title>
    {% include "_catalog_styles.html" %}
    <style>
        .products-page-head { align-items: center; }
        .products-head-actions { display: flex; flex-wrap: wrap; gap: 8px; }
        .products-toolbar { display: flex; gap: 8px; margin-bottom: 12px; padding: 10px; }
        .products-filter-form { display: grid; width: 100%; grid-template-columns: minmax(260px, 1fr) repeat(3, minmax(125px, 180px)) auto; gap: 8px; align-items: center; }
        .products-search-wrap { position: relative; }
        .products-search-wrap input, .products-filter-form select { width: 100%; height: 40px; border: 1px solid #cbd5e1; border-radius: 10px; background: #fff; }
        .products-search-wrap input { padding-right: 38px; }
        .products-search-clear { position: absolute; top: 4px; right: 4px; width: 32px; height: 32px; padding: 0; border: 0; border-radius: 8px; background: transparent; color: #64748b; font-size: 22px; cursor: pointer; }
        .products-search-clear:hover { background: #f1f5f9; color: #0f172a; }
        .products-search-clear[hidden] { display: none; }
        .products-zero-toggle { display: inline-flex; min-height: 40px; align-items: center; gap: 6px; padding: 0 8px; white-space: nowrap; font-size: 12px; font-weight: 700; }
        .products-results { position: relative; min-height: 180px; }
        .products-results[aria-busy="true"]::after { content: ""; position: absolute; top: 0; right: 0; width: 52px; height: 3px; border-radius: 2px; background: #2563eb; animation: products-progress .8s ease-in-out infinite alternate; }
        @keyframes products-progress { from { transform: translateX(-90px); opacity: .3; } to { transform: translateX(0); opacity: 1; } }
        .products-result-head { display: flex; justify-content: space-between; gap: 12px; padding: 0 3px 8px; color: #64748b; font-size: 12px; }
        .products-table-scroll { overflow: auto; border: 1px solid #e2e8f0; border-radius: 13px; background: #fff; }
        .products-table { min-width: 1120px; table-layout: fixed; }
        .products-table th { position: relative; height: 36px; padding: 0 8px; background: #f8fafc; }
        .products-table td { height: 50px; padding: 5px 8px; line-height: 1.2; }
        .products-table tbody tr:hover { background: #f8fafc; }
        .products-table tbody tr.is-zero-stock { color: #64748b; background: #fafafa; }
        .products-sort-button { display: flex; width: 100%; height: 36px; align-items: center; justify-content: space-between; gap: 5px; padding: 0; border: 0; background: transparent; color: inherit; font: inherit; font-weight: 800; cursor: pointer; }
        .products-sort-button.is-active { color: #1d4ed8; }
        .products-column-resize { position: absolute; top: 0; right: -4px; z-index: 3; width: 9px; height: 100%; cursor: col-resize; touch-action: none; }
        .products-column-resize::after { content: ""; position: absolute; top: 8px; bottom: 8px; left: 4px; width: 1px; background: #2563eb; opacity: 0; }
        .products-column-resize:hover::after, .products-column-resize.is-active::after { opacity: 1; }
        html.products-resizing { cursor: col-resize; user-select: none; }
        .products-photo-cell { text-align: center; }
        .products-thumb-shell, .products-thumb { display: inline-grid; width: 38px; height: 38px; place-items: center; }
        .products-thumb { border: 1px solid #e2e8f0; border-radius: 8px; object-fit: contain; background: #fff; }
        .products-thumb-empty { padding: 3px; color: #94a3b8; background: #f8fafc; font-size: 8px; text-align: center; }
        .products-name-cell { overflow-wrap: anywhere; }
        .products-mobile-meta { display: none; margin-top: 3px; color: #64748b; font-size: 10px; }
        .products-stock-cell strong { font-size: 14px; }
        .products-stock-cell.is-zero strong { color: #94a3b8; }
        .products-action-button { display: inline-flex; padding: 6px 9px; border-radius: 8px; background: #eff6ff; color: #1d4ed8; font-size: 11px; font-weight: 800; }
        .products-pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        @media (max-width: 1080px) {
            .products-filter-form { grid-template-columns: minmax(240px, 1fr) repeat(2, minmax(120px, 1fr)); }
            .products-zero-toggle { min-height: 34px; }
        }
        @media (max-width: 700px) {
            .main { padding: 13px; }
            .products-page-head { align-items: flex-start; }
            .products-filter-form { grid-template-columns: 1fr 1fr; }
            .products-search-wrap { grid-column: 1 / -1; }
            .products-filter-form select[name="cell"] { display: none; }
            .products-table { min-width: 430px; }
            .products-table col:nth-child(3), .products-table col:nth-child(4), .products-table col:nth-child(5), .products-table col:nth-child(7), .products-table col:nth-child(8),
            .products-table th:nth-child(3), .products-table th:nth-child(4), .products-table th:nth-child(5), .products-table th:nth-child(7), .products-table th:nth-child(8),
            .products-table td:nth-child(3), .products-table td:nth-child(4), .products-table td:nth-child(5), .products-table td:nth-child(7), .products-table td:nth-child(8) { display: none; }
            .products-mobile-meta { display: block; }
            .products-result-head { display: block; }
            .products-pagination { align-items: flex-start; flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>
<div class="app">
    {% include "_sidebar.html" %}
    <main class="main">
        <div class="page-head products-page-head">
            <div><h1 class="page-title">Товары</h1><p class="page-note">Каталог и актуальные складские остатки.</p></div>
            <div class="products-head-actions">
                <a class="button button-primary" href="{{ url_for('excel_receipt_new') }}">Оформить приход</a>
                <a class="button" href="/warehouse?open_add=1#warehouseAddCard">Добавить товар</a>
            </div>
        </div>

        <section class="panel products-toolbar">
            <form id="productsFilterForm" class="products-filter-form" method="get" action="{{ url_for('excel_products_page') }}">
                <input type="hidden" name="sort_by" value="{{ catalog.sort_by }}">
                <input type="hidden" name="sort_dir" value="{{ catalog.sort_dir }}">
                <input type="hidden" name="per_page" value="{{ catalog.per_page }}">
                <div class="products-search-wrap">
                    <input id="productsSearchInput" type="search" name="q" value="{{ filters.query }}" autocomplete="off" placeholder="Название, бренд, артикул или ячейка" aria-label="Поиск товаров">
                    <button id="productsSearchClear" class="products-search-clear" type="button" aria-label="Очистить поиск"{% if not filters.query %} hidden{% endif %}>×</button>
                </div>
                <select name="brand" aria-label="Фильтр по бренду"><option value="">Все бренды</option>{% for brand in catalog.brands %}<option value="{{ brand }}"{% if filters.brand == brand %} selected{% endif %}>{{ brand }}</option>{% endfor %}</select>
                <select name="category" aria-label="Фильтр по категории"><option value="">Все категории</option>{% for category in catalog.categories %}<option value="{{ category }}"{% if filters.category == category %} selected{% endif %}>{{ category }}</option>{% endfor %}</select>
                <select name="cell" aria-label="Фильтр по ячейке"><option value="">Все ячейки</option>{% for group in catalog.cell_groups %}<option value="{{ group.cell }}"{% if filters.cell == group.cell %} selected{% endif %}>{{ group.cell }}</option>{% endfor %}</select>
                <label class="products-zero-toggle"><input type="checkbox" name="hide_zero" value="1"{% if filters.hide_zero %} checked{% endif %}> Скрыть нулевые</label>
            </form>
        </section>

        <section id="productsResults" class="products-results" aria-busy="false">
            {% include "_excel_products_results.html" %}
        </section>
    </main>
</div>
<script id="products-interface-script">
(function () {
    "use strict";
    const form = document.getElementById("productsFilterForm");
    const results = document.getElementById("productsResults");
    const searchInput = document.getElementById("productsSearchInput");
    const clearButton = document.getElementById("productsSearchClear");
    const widthsKey = "vechasuProductsColumnWidthsV2";
    const scrollKey = "vechasuProductsScrollPositionV2";
    const searchDebounceMs = 350;
    let searchTimer = null;
    let activeRequest = null;

    function urlFromForm(resetPage) {
        const data = new FormData(form);
        const params = new URLSearchParams();
        data.forEach(function (value, key) {
            const normalized = String(value || "").trim();
            if (!normalized) return;
            if (key === "sort_by" && normalized === "name") return;
            if (key === "sort_dir" && normalized === "asc") return;
            if (key === "per_page" && normalized === "50") return;
            params.set(key, normalized);
        });
        if (!resetPage) {
            const page = new URL(window.location.href).searchParams.get("page");
            if (page) params.set("page", page);
        }
        return "/products" + (params.toString() ? "?" + params.toString() : "");
    }

    function syncControlsFromUrl() {
        const params = new URL(window.location.href).searchParams;
        ["q", "brand", "category", "cell", "sort_by", "sort_dir"].forEach(function (name) {
            const input = form.elements[name];
            if (input) input.value = params.get(name) || (name === "sort_by" ? "name" : name === "sort_dir" ? "asc" : "");
        });
        form.elements.hide_zero.checked = params.get("hide_zero") === "1";
        clearButton.hidden = !searchInput.value.trim();
    }

    async function loadProducts(targetUrl, historyMode) {
        if (activeRequest) activeRequest.abort();
        const controller = new AbortController();
        activeRequest = controller;
        const requested = new URL(targetUrl, window.location.origin);
        const visibleUrl = requested.pathname + requested.search;
        requested.searchParams.set("_partial", "1");
        results.setAttribute("aria-busy", "true");
        try {
            const response = await fetch(requested.pathname + requested.search, { headers: { "X-Requested-With": "VechasuProducts" }, signal: controller.signal });
            if (!response.ok) throw new Error("Products request failed");
            results.innerHTML = await response.text();
            if (historyMode === "push") window.history.pushState({}, "", visibleUrl);
            if (historyMode === "replace") window.history.replaceState({}, "", visibleUrl);
            syncControlsFromUrl();
            initializeResults();
        } catch (error) {
            if (error.name !== "AbortError") window.location.assign(visibleUrl);
        } finally {
            if (activeRequest === controller) {
                activeRequest = null;
                results.setAttribute("aria-busy", "false");
            }
        }
    }

    function navigate(historyMode) { loadProducts(urlFromForm(true), historyMode); }
    function saveScrollForReturn() {
        sessionStorage.setItem(scrollKey, JSON.stringify({ url: window.location.pathname + window.location.search, y: window.scrollY }));
    }
    function restoreScroll() {
        try {
            const saved = JSON.parse(sessionStorage.getItem(scrollKey) || "null");
            if (!saved || saved.url !== window.location.pathname + window.location.search) return;
            sessionStorage.removeItem(scrollKey);
            requestAnimationFrame(function () { window.scrollTo(0, Number(saved.y) || 0); });
        } catch (error) { sessionStorage.removeItem(scrollKey); }
    }
    function storedWidths() {
        try { return JSON.parse(localStorage.getItem(widthsKey) || "{}"); } catch (error) { return {}; }
    }
    function initializeResizableColumns() {
        const table = results.querySelector("[data-products-table]");
        if (!table) return;
        const columns = Array.from(table.querySelectorAll("col[data-column]"));
        const headers = Array.from(table.querySelectorAll("thead th[data-column-key]"));
        const saved = storedWidths();
        columns.forEach(function (column) { if (saved[column.dataset.column]) column.style.width = saved[column.dataset.column] + "px"; });
        headers.slice(0, -1).forEach(function (header, index) {
            const handle = document.createElement("span");
            handle.className = "products-column-resize";
            handle.setAttribute("aria-hidden", "true");
            header.appendChild(handle);
            handle.addEventListener("pointerdown", function (event) {
                event.preventDefault();
                const left = columns[index];
                const right = columns[index + 1];
                const startX = event.clientX;
                const leftStart = left.getBoundingClientRect().width;
                const rightStart = right.getBoundingClientRect().width;
                handle.classList.add("is-active");
                document.documentElement.classList.add("products-resizing");
                function move(moveEvent) {
                    const delta = moveEvent.clientX - startX;
                    left.style.width = Math.max(58, leftStart + delta) + "px";
                    right.style.width = Math.max(58, rightStart - delta) + "px";
                }
                function finish() {
                    document.removeEventListener("pointermove", move);
                    document.removeEventListener("pointerup", finish);
                    handle.classList.remove("is-active");
                    document.documentElement.classList.remove("products-resizing");
                    const widths = {};
                    columns.forEach(function (column) { widths[column.dataset.column] = Math.round(column.getBoundingClientRect().width); });
                    localStorage.setItem(widthsKey, JSON.stringify(widths));
                }
                document.addEventListener("pointermove", move);
                document.addEventListener("pointerup", finish, { once: true });
            });
        });
    }
    function initializeResults() {
        initializeResizableColumns();
        results.querySelectorAll("[data-product-detail-link]").forEach(function (link) { link.addEventListener("click", saveScrollForReturn); });
    }
    window.handleProductImageError = function (image) {
        const link = image.closest("a");
        if (link) link.hidden = true;
        const placeholder = image.closest(".products-thumb-shell").querySelector(".products-thumb-empty");
        if (placeholder) placeholder.hidden = false;
    };
    form.addEventListener("submit", function (event) { event.preventDefault(); navigate("push"); });
    searchInput.addEventListener("input", function () {
        clearButton.hidden = !searchInput.value.trim();
        window.clearTimeout(searchTimer);
        searchTimer = window.setTimeout(function () { navigate("replace"); }, searchDebounceMs);
    });
    clearButton.addEventListener("click", function () {
        window.clearTimeout(searchTimer);
        searchInput.value = "";
        clearButton.hidden = true;
        searchInput.focus();
        navigate("replace");
    });
    form.querySelectorAll("select, input[type=checkbox]").forEach(function (control) { control.addEventListener("change", function () { navigate("push"); }); });
    document.addEventListener("click", function (event) {
        const page = event.target.closest("[data-products-page-link]");
        if (page) { event.preventDefault(); loadProducts(page.href, "push"); return; }
        const sort = event.target.closest("[data-sort-field]");
        if (sort) {
            const field = form.elements.sort_by.value || "name";
            const direction = form.elements.sort_dir.value || "asc";
            form.elements.sort_by.value = sort.dataset.sortField;
            form.elements.sort_dir.value = field === sort.dataset.sortField && direction === "asc" ? "desc" : "asc";
            navigate("push");
        }
    });
    window.addEventListener("popstate", function () { syncControlsFromUrl(); loadProducts(window.location.href, "none"); });
    syncControlsFromUrl();
    initializeResults();
    restoreScroll();
})();
</script>
</body>
</html>

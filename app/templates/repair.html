<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>ТТТ ERP — Ремонт</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body { margin: 0; background: #f6f7f9; color: #111827; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
        .main { padding: 28px; }
        h1 { margin: 0 0 8px; font-size: 34px; letter-spacing: -0.04em; }
        .subtitle { color: #6b7280; margin-bottom: 24px; }
        .card { background: white; border: 1px solid #e5e7eb; border-radius: 20px; padding: 18px; margin-bottom: 20px; box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08); }
        .card-title { font-size: 18px; font-weight: 900; margin-bottom: 14px; }
        .form-grid { display: grid; grid-template-columns: 1.2fr 0.9fr 1fr 1.3fr 0.8fr; gap: 10px; align-items: start; }
        input, textarea, select { width: 100%; border: 1px solid #d1d5db; border-radius: 14px; padding: 12px 14px; font-size: 14px; font-family: inherit; box-sizing: border-box; }
        textarea { min-height: 86px; resize: vertical; }
        .btn { border: 0; border-radius: 14px; padding: 12px 14px; font-weight: 900; cursor: pointer; text-decoration: none; display: inline-flex; justify-content: center; align-items: center; }
        .btn-primary { background: #111827; color: white; width: 100%; margin-top: 10px; }
        .btn-soft { background: #eef2ff; color: #3730a3; width: 100%; margin-top: 8px; }
        .btn-danger { background: #fee2e2; color: #991b1b; width: 100%; margin-top: 8px; }
        .notice { padding: 14px 16px; border-radius: 16px; margin-bottom: 18px; font-weight: 900; }
        .notice.success { background: #dcfce7; color: #166534; }
        .notice.error { background: #fee2e2; color: #991b1b; }
        .toolbar { display: flex; gap: 10px; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .search { display: flex; gap: 10px; flex: 1; max-width: 620px; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { text-align: left; background: #f9fafb; color: #374151; font-size: 13px; padding: 13px 12px; border-bottom: 1px solid #e5e7eb; }
        td { padding: 13px 12px; border-bottom: 1px solid #eef2f7; vertical-align: top; font-size: 14px; line-height: 1.35; }
        .table-wrap { overflow-x: auto; }
        .status { display: inline-flex; padding: 7px 10px; border-radius: 999px; font-size: 12px; font-weight: 900; white-space: nowrap; }
        .status.new { background: #dbeafe; color: #1d4ed8; }
        .status.waiting { background: #fef3c7; color: #92400e; }
        .status.in_progress { background: #ede9fe; color: #6d28d9; }
        .status.done { background: #dcfce7; color: #166534; }
        .empty { padding: 30px; text-align: center; color: #6b7280; font-weight: 900; }
        @media (max-width: 1100px) { .main { padding: 20px; } .form-grid { grid-template-columns: 1fr; } .toolbar { flex-direction: column; align-items: stretch; } .search { max-width: none; } }

        /* Заголовок страницы удалён для экономии места */
        .main {
            padding-top: 10px;
        }
        /* Конец компактного верха страницы */

</style>
</head>
<body>

</body>
</html>

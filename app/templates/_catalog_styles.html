<style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #f6f7f9; color: #111827; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
    .main { min-width: 0; padding: 18px 28px 32px; }
    .page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; margin-bottom: 16px; }
    .page-title { margin: 0; font-size: 27px; font-weight: 850; letter-spacing: -.04em; }
    .page-note { margin: 5px 0 0; color: #64748b; font-size: 13px; }
    .button { display: inline-flex; min-height: 40px; align-items: center; justify-content: center; padding: 0 15px; border: 1px solid #cbd5e1; border-radius: 10px; background: #fff; color: #0f172a; font-size: 13px; font-weight: 800; text-decoration: none; cursor: pointer; }
    .button-primary { border-color: #2563eb; background: #2563eb; color: #fff; }
    .panel { min-width: 0; margin-bottom: 14px; padding: 17px; border: 1px solid #e5e7eb; border-radius: 16px; background: #fff; box-shadow: 0 7px 22px rgba(15, 23, 42, .04); }
    .filters { display: grid; grid-template-columns: minmax(240px, 1fr) 180px 240px auto; gap: 10px; }
    input, select { width: 100%; height: 40px; padding: 0 11px; border: 1px solid #d1d5db; border-radius: 10px; background: #fff; color: #111827; font: inherit; font-size: 13px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 10px; border-bottom: 1px solid #e5e7eb; background: #f8fafc; color: #64748b; font-size: 11px; font-weight: 850; text-align: left; text-transform: uppercase; letter-spacing: .03em; white-space: nowrap; }
    td { padding: 11px 10px; border-bottom: 1px solid #f1f5f9; font-size: 13px; vertical-align: middle; }
    tr:last-child td { border-bottom: 0; }
    .product-cell { display: flex; min-width: 250px; align-items: center; gap: 11px; }
    .thumb { width: 48px; height: 48px; flex: 0 0 48px; object-fit: contain; border: 1px solid #e2e8f0; border-radius: 10px; background: #fff; }
    .thumb-empty { display: grid; place-items: center; color: #94a3b8; background: #f8fafc; }
    .product-name { color: #0f172a; font-weight: 850; text-decoration: none; }
    .muted { color: #64748b; font-size: 12px; }
    .badge { display: inline-flex; padding: 4px 8px; border-radius: 999px; background: #eef2ff; color: #3730a3; font-size: 11px; font-weight: 850; white-space: nowrap; }
    .badge-green { background: #dcfce7; color: #166534; }
    .badge-gray { background: #f1f5f9; color: #475569; }
    .badge-red { background: #fee2e2; color: #991b1b; }
    .empty { padding: 34px 12px; color: #94a3b8; text-align: center; }
    .pagination { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-top: 14px; color: #64748b; font-size: 12px; }
    .detail-grid { display: grid; grid-template-columns: minmax(0, 1.5fr) minmax(290px, .7fr); gap: 14px; }
    .section-title { margin: 0 0 12px; font-size: 17px; font-weight: 900; }
    .gallery { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 10px; }
    .gallery img { width: 100%; aspect-ratio: 1; object-fit: contain; border: 1px solid #e2e8f0; border-radius: 12px; background: #fff; }
    .description { color: #334155; font-size: 14px; line-height: 1.6; overflow-wrap: anywhere; }
    .key-values { display: grid; grid-template-columns: minmax(130px, .4fr) minmax(0, 1fr); gap: 0; }
    .key-values > div { padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px; overflow-wrap: anywhere; }
    .key { color: #64748b; }
    .preview-stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 14px; }
    .stat { padding: 14px; border-radius: 13px; background: #f8fafc; }
    .stat strong { display: block; font-size: 25px; }
    .change { margin-top: 6px; padding: 9px; border-radius: 9px; background: #f8fafc; overflow-wrap: anywhere; }
    .change-label { color: #64748b; font-size: 11px; font-weight: 800; text-transform: uppercase; }
    .change-value { margin-top: 3px; font-size: 12px; white-space: pre-wrap; }
    @media (max-width: 1100px) { .filters { grid-template-columns: 1fr 1fr; } .detail-grid { grid-template-columns: 1fr; } }
    @media (max-width: 700px) { .main { padding: 15px; } .page-head { flex-direction: column; } .filters { grid-template-columns: 1fr; } .gallery { grid-template-columns: repeat(2, 1fr); } .preview-stats { grid-template-columns: repeat(2, 1fr); } .key-values { grid-template-columns: 1fr; } .key { padding-bottom: 0 !important; border-bottom: 0 !important; } }
</style>

<style>
    .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
        transition: grid-template-columns 0.25s ease;
    }

    .app.sidebar-collapsed {
        grid-template-columns: 76px minmax(0, 1fr);
    }

    .sidebar {
        position: relative;
        min-width: 0;
        background: #0b1f3a;
        color: white;
        padding: 24px 18px;
        transition: padding 0.25s ease;
        box-shadow: 4px 0 18px rgba(15, 23, 42, 0.12);
        z-index: 20;
    }

    .sidebar-top {
        position: absolute;
        top: 12px;
        left: 18px;
        right: 10px;
        height: 42px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 0;
        z-index: 30;
    }

    .logo {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        color: white;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.04em;
        text-decoration: none;
        white-space: nowrap;
        overflow: hidden;
    }

    .logo:hover {
        color: white;
        text-decoration: none;
    }

    .logo span {
        color: #bfdbfe;
    }

    .logo-compact {
        display: none;
        color: white;
        font-size: 22px;
        font-weight: 900;
    }

    .sidebar-toggle {
        position: relative;
        flex: 0 0 36px;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 11px;
        background: rgba(255, 255, 255, 0.09);
        color: #dbeafe;
        cursor: pointer;
        box-shadow:
            inset 0 1px 0 rgba(255, 255, 255, 0.08),
            0 4px 12px rgba(2, 12, 27, 0.18);
        backdrop-filter: blur(8px);
        transition:
            background 0.2s ease,
            border-color 0.2s ease,
            transform 0.2s ease;
        z-index: 30;
    }

    .sidebar-toggle:hover {
        background: rgba(255, 255, 255, 0.17);
        border-color: rgba(255, 255, 255, 0.3);
        transform: translateY(-1px);
    }

    .sidebar-toggle-icon {
        width: 18px;
        height: 18px;
        display: block;
        transition: transform 0.25s ease;
    }

    .sidebar-toggle.is-collapsed .sidebar-toggle-icon {
        transform: rotate(180deg);
    }

    .nav-title {
        font-size: 12px;
        color: #bfdbfe;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 10px;
        white-space: nowrap;
        overflow: hidden;
    }

    .sidebar-nav {
        display: block;
        padding-top: 54px;
    }

    .sidebar-link {
        display: flex;
        align-items: center;
        gap: 11px;
        min-height: 44px;
        padding: 11px 12px;
        border-radius: 12px;
        color: #dbeafe;
        font-size: 15px;
        font-weight: 800;
        margin-bottom: 6px;
        text-decoration: none;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        transition:
            background 0.2s ease,
            color 0.2s ease;
    }

    .sidebar-link:hover {
        background: transparent;
        color: white;
        text-decoration: none;
    }

    .sidebar-link.active:hover {
        background: rgba(255, 255, 255, 0.18);
    }

    .sidebar-link.active {
        background: rgba(255, 255, 255, 0.18);
        color: white;
        box-shadow: inset 3px 0 0 #93c5fd;
    }

    .sidebar-link.disabled {
        opacity: 0.6;
        cursor: default;
        pointer-events: none;
    }

    .sidebar-icon {
        flex: 0 0 22px;
        width: 22px;
        text-align: center;
        font-size: 17px;
    }

    .sidebar-label {
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .app.sidebar-collapsed .sidebar {
        padding-left: 12px;
        padding-right: 12px;
    }

    .app.sidebar-collapsed .logo-full,
    .app.sidebar-collapsed .nav-title,
    .app.sidebar-collapsed .sidebar-label {
        display: none;
    }

    .app.sidebar-collapsed .logo-compact {
        display: block;
    }

    .app.sidebar-collapsed .sidebar-link {
        justify-content: center;
        gap: 0;
        padding-left: 10px;
        padding-right: 10px;
    }

    .app.sidebar-collapsed .sidebar-link.active {
        box-shadow: none;
        outline: 2px solid rgba(147, 197, 253, 0.9);
    }

    @media (max-width: 1100px) {
        .app,
        .app.sidebar-collapsed {
            grid-template-columns: 1fr;
        }

        .sidebar {
            display: none;
        }
    }

    /* Единая высота пунктов меню */
    .sidebar-link,
    .sidebar-link.active,
    .sidebar-link.disabled {
        width: 100%;
        height: 48px;
        min-height: 48px;
        padding: 0 12px;
        box-sizing: border-box;
        margin-bottom: 6px;
    }

    .app.sidebar-collapsed .sidebar-link,
    .app.sidebar-collapsed .sidebar-link.active,
    .app.sidebar-collapsed .sidebar-link.disabled {
        height: 48px;
        min-height: 48px;
        padding: 0 10px;
    }
    /* Конец единой высоты пунктов меню */


    /* Дата и время в боковой панели */
    .sidebar-datetime {
        min-width: 0;
        color: white;
        white-space: nowrap;
        line-height: 1;
    }

    .sidebar-time {
        margin-bottom: 5px;
        font-size: 17px;
        font-weight: 850;
        letter-spacing: 0.02em;
        font-variant-numeric: tabular-nums;
    }

    .sidebar-date {
        overflow: hidden;
        color: #9fb7d5;
        font-size: 11px;
        font-weight: 700;
        line-height: 1.15;
        text-overflow: ellipsis;
        text-transform: capitalize;
    }

    .app.sidebar-collapsed .sidebar-top {
        left: 10px;
        right: 10px;
        justify-content: center;
    }

    .app.sidebar-collapsed .sidebar-datetime {
        display: none;
    }
    /* Конец даты и времени */


    /* Статус ERP внизу боковой панели */
    .sidebar-system-status {
        position: absolute;
        left: 18px;
        right: 18px;
        bottom: 18px;
        display: flex;
        align-items: center;
        gap: 9px;
        min-height: 42px;
        padding: 10px 12px;
        border: 1px solid rgba(134, 239, 172, 0.16);
        border-radius: 12px;
        background: rgba(22, 163, 74, 0.10);
        color: #dcfce7;
        font-size: 13px;
        font-weight: 800;
        white-space: nowrap;
        overflow: hidden;
    }

    .sidebar-system-dot {
        flex: 0 0 9px;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #22c55e;
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.12);
    }

    .sidebar-system-text {
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .app.sidebar-collapsed .sidebar-system-status {
        left: 17px;
        right: 17px;
        justify-content: center;
        padding: 0;
        background: transparent;
        border-color: transparent;
    }

    .app.sidebar-collapsed .sidebar-system-text {
        display: none;
    }
    /* Конец статуса ERP */

</style>

<aside class="sidebar" id="appSidebar">
    <div class="sidebar-top">
        <div
            class="sidebar-datetime"
            aria-label="Текущие дата и время"
        >
            <div id="sidebarClock" class="sidebar-time">--:--</div>
            <div id="sidebarDate" class="sidebar-date">Загрузка даты</div>
        </div>

        <button
            id="sidebarToggle"
            class="sidebar-toggle"
            type="button"
            aria-label="Свернуть боковую панель"
            aria-expanded="true"
            title="Свернуть боковую панель"
        >
            <svg
                class="sidebar-toggle-icon"
                viewBox="0 0 24 24"
                fill="none"
                aria-hidden="true"
            >
                <path
                    d="M15 6L9 12L15 18"
                    stroke="currentColor"
                    stroke-width="2.4"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                />
            </svg>
        </button>
    </div>

    

    <nav class="sidebar-nav">
        <a
            class="sidebar-link {% if request.path == '/' or request.path.startswith('/order') %}active{% endif %}"
            href="/"
            title="Заказы"
        >
            <span class="sidebar-icon">📦</span>
            <span class="sidebar-label">Заказы</span>
        </a>

        <a
            class="sidebar-link {% if request.path.startswith('/warehouse') %}active{% endif %}"
            href="/warehouse"
            title="Товары"
        >
            <span class="sidebar-icon">🏷</span>
            <span class="sidebar-label">Товары</span>
        </a>

        <a
            class="sidebar-link {% if request.path.startswith('/sales') %}active{% endif %}"
            href="/sales"
            title="Продажи"
        >
            <span class="sidebar-icon">💰</span>
            <span class="sidebar-label">Продажи</span>
        </a>

        <a
            class="sidebar-link {% if request.path.startswith('/stock-operations') %}active{% endif %}"
            href="/stock-operations"
            title="Журнал операций"
        >
            <span class="sidebar-icon">📒</span>
            <span class="sidebar-label">Журнал операций</span>
        </a>

        <a
            class="sidebar-link {% if request.path.startswith('/repair') %}active{% endif %}"
            href="/repair"
            title="Ремонт"
        >
            <span class="sidebar-icon">🛠</span>
            <span class="sidebar-label">Ремонт</span>
        </a>

        <a
            class="sidebar-link {% if request.path.startswith('/settings') %}active{% endif %}"
            href="/settings"
            title="Настройки"
        >
            <span class="sidebar-icon">⚙️</span>
            <span class="sidebar-label">Настройки</span>
        </a>
    </nav>

    <div
        class="sidebar-system-status"
        title="Система работает"
    >
        <span class="sidebar-system-dot"></span>
        <span class="sidebar-system-text">ERP работает</span>
    </div>

</aside>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const app = document.querySelector(".app");
        const toggle = document.getElementById("sidebarToggle");

        if (!app || !toggle) {
            return;
        }

        const storageKey = "ttt-erp-sidebar-collapsed";

        const applySidebarState = (collapsed) => {
            app.classList.toggle("sidebar-collapsed", collapsed);

            toggle.classList.toggle("is-collapsed", collapsed);
            toggle.setAttribute("aria-expanded", String(!collapsed));
            toggle.setAttribute(
                "aria-label",
                collapsed
                    ? "Развернуть боковую панель"
                    : "Свернуть боковую панель"
            );
            toggle.title = collapsed
                ? "Развернуть боковую панель"
                : "Свернуть боковую панель";
        };

        let collapsed = false;

        try {
            collapsed = localStorage.getItem(storageKey) === "1";
        } catch (error) {
            collapsed = false;
        }

        applySidebarState(collapsed);

        toggle.addEventListener("click", () => {
            const nextState = !app.classList.contains("sidebar-collapsed");
            applySidebarState(nextState);

            try {
                localStorage.setItem(storageKey, nextState ? "1" : "0");
            } catch (error) {
                // Панель продолжит работать без сохранения состояния.
            }
        });
    });
</script>


<script>
    document.addEventListener("DOMContentLoaded", () => {
        const clockElement = document.getElementById("sidebarClock");
        const dateElement = document.getElementById("sidebarDate");

        if (!clockElement || !dateElement) {
            return;
        }

        const timeFormatter = new Intl.DateTimeFormat("ru-RU", {
            hour: "2-digit",
            minute: "2-digit",
            hour12: false
        });

        const dateFormatter = new Intl.DateTimeFormat("ru-RU", {
            weekday: "short",
            day: "numeric",
            month: "long"
        });

        const updateSidebarDateTime = () => {
            const now = new Date();

            clockElement.textContent = timeFormatter.format(now);
            dateElement.textContent = dateFormatter
                .format(now)
                .replace(".", "");
        };

        updateSidebarDateTime();
        window.setInterval(updateSidebarDateTime, 1000);
    });
</script>

<style>
    .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
        transition: grid-template-columns 0.25s ease;
    }

    .app.sidebar-collapsed {
        grid-template-columns: 76px minmax(0, 1fr);
    }

    .sidebar {
        position: relative;
        min-width: 0;
        background: #0b1f3a;
        color: white;
        padding: 24px 18px;
        transition: padding 0.25s ease;
        box-shadow: 4px 0 18px rgba(15, 23, 42, 0.12);
        z-index: 20;
    }

    .sidebar-top {
        position: absolute;
        top: 14px;
        right: 0;
        min-height: 0;
        margin: 0;
    }

    .logo {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        color: white;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.04em;
        text-decoration: none;
        white-space: nowrap;
        overflow: hidden;
    }

    .logo:hover {
        color: white;
        text-decoration: none;
    }

    .logo span {
        color: #bfdbfe;
    }

    .logo-compact {
        display: none;
        color: white;
        font-size: 22px;
        font-weight: 900;
    }

    .sidebar-toggle {
        position: absolute;
        top: 1px;
        right: -34px;
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #dbeafe;
        border-radius: 50%;
        background: white;
        color: #0b1f3a;
        font-size: 22px;
        font-weight: 800;
        line-height: 1;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.16);
        transition:
            transform 0.2s ease,
            background 0.2s ease;
        z-index: 30;
    }

    .sidebar-toggle:hover {
        background: #eff6ff;
        transform: scale(1.06);
    }

    .nav-title {
        font-size: 12px;
        color: #bfdbfe;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 10px;
        white-space: nowrap;
        overflow: hidden;
    }

    .sidebar-nav {
        display: block;
    }

    .sidebar-link {
        display: flex;
        align-items: center;
        gap: 11px;
        min-height: 44px;
        padding: 11px 12px;
        border-radius: 12px;
        color: #dbeafe;
        font-size: 15px;
        font-weight: 800;
        margin-bottom: 6px;
        text-decoration: none;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        transition:
            background 0.2s ease,
            color 0.2s ease;
    }

    .sidebar-link:hover {
        background: transparent;
        color: white;
        text-decoration: none;
    }

    .sidebar-link.active:hover {
        background: rgba(255, 255, 255, 0.18);
    }

    .sidebar-link.active {
        background: rgba(255, 255, 255, 0.18);
        color: white;
        box-shadow: inset 3px 0 0 #93c5fd;
    }

    .sidebar-link.disabled {
        opacity: 0.6;
        cursor: default;
        pointer-events: none;
    }

    .sidebar-icon {
        flex: 0 0 22px;
        width: 22px;
        text-align: center;
        font-size: 17px;
    }

    .sidebar-label {
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .app.sidebar-collapsed .sidebar {
        padding-left: 12px;
        padding-right: 12px;
    }

    .app.sidebar-collapsed .logo-full,
    .app.sidebar-collapsed .nav-title,
    .app.sidebar-collapsed .sidebar-label {
        display: none;
    }

    .app.sidebar-collapsed .logo-compact {
        display: block;
    }

    .app.sidebar-collapsed .sidebar-link {
        justify-content: center;
        gap: 0;
        padding-left: 10px;
        padding-right: 10px;
    }

    .app.sidebar-collapsed .sidebar-link.active {
        box-shadow: none;
        outline: 2px solid rgba(147, 197, 253, 0.9);
    }

    @media (max-width: 1100px) {
        .app,
        .app.sidebar-collapsed {
            grid-template-columns: 1fr;
        }

        .sidebar {
            display: none;
        }
    }

    /* Единая высота пунктов меню */
    .sidebar-link,
    .sidebar-link.active,
    .sidebar-link.disabled {
        width: 100%;
        height: 48px;
        min-height: 48px;
        padding: 0 12px;
        box-sizing: border-box;
        margin-bottom: 6px;
    }

    .app.sidebar-collapsed .sidebar-link,
    .app.sidebar-collapsed .sidebar-link.active,
    .app.sidebar-collapsed .sidebar-link.disabled {
        height: 48px;
        min-height: 48px;
        padding: 0 10px;
    }
    /* Конец единой высоты пунктов меню */

</style>

<aside class="sidebar" id="appSidebar">
    <div class="sidebar-top">
        

        <button
            id="sidebarToggle"
            class="sidebar-toggle"
            type="button"
            aria-label="Свернуть боковую панель"
            aria-expanded="true"
            title="Свернуть боковую панель"
        >
            ‹
        </button>
    </div>

    

    <nav class="sidebar-nav">
        <a
            class="sidebar-link {% if request.path == '/' or request.path.startswith('/order') %}active{% endif %}"
            href="/"
            title="Заказы"
        >
            <span class="sidebar-icon">📦</span>
            <span class="sidebar-label">Заказы</span>
        </a>

        <a
            class="sidebar-link {% if request.path.startswith('/sales') %}active{% endif %}"
            href="/sales"
            title="Продажи"
        >
            <span class="sidebar-icon">💰</span>
            <span class="sidebar-label">Продажи</span>
        </a>

        <a
            class="sidebar-link {% if request.path.startswith('/warehouse') %}active{% endif %}"
            href="/warehouse"
            title="Остатки"
        >
            <span class="sidebar-icon">🏷</span>
            <span class="sidebar-label">Остатки</span>
        </a>

        <a
            class="sidebar-link {% if request.path.startswith('/stock-operations') %}active{% endif %}"
            href="/stock-operations"
            title="Журнал операций"
        >
            <span class="sidebar-icon">📒</span>
            <span class="sidebar-label">Журнал операций</span>
        </a>

        <a
            class="sidebar-link {% if request.path.startswith('/repair') %}active{% endif %}"
            href="/repair"
            title="Ремонт"
        >
            <span class="sidebar-icon">🛠</span>
            <span class="sidebar-label">Ремонт</span>
        </a>

        <div class="sidebar-link disabled" title="Настройки">
            <span class="sidebar-icon">⚙️</span>
            <span class="sidebar-label">Настройки</span>
        </div>
    </nav>
</aside>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const app = document.querySelector(".app");
        const toggle = document.getElementById("sidebarToggle");

        if (!app || !toggle) {
            return;
        }

        const storageKey = "ttt-erp-sidebar-collapsed";

        const applySidebarState = (collapsed) => {
            app.classList.toggle("sidebar-collapsed", collapsed);

            toggle.textContent = collapsed ? "›" : "‹";
            toggle.setAttribute("aria-expanded", String(!collapsed));
            toggle.setAttribute(
                "aria-label",
                collapsed
                    ? "Развернуть боковую панель"
                    : "Свернуть боковую панель"
            );
            toggle.title = collapsed
                ? "Развернуть боковую панель"
                : "Свернуть боковую панель";
        };

        let collapsed = false;

        try {
            collapsed = localStorage.getItem(storageKey) === "1";
        } catch (error) {
            collapsed = false;
        }

        applySidebarState(collapsed);

        toggle.addEventListener("click", () => {
            const nextState = !app.classList.contains("sidebar-collapsed");
            applySidebarState(nextState);

            try {
                localStorage.setItem(storageKey, nextState ? "1" : "0");
            } catch (error) {
                // Панель продолжит работать без сохранения состояния.
            }
        });
    });
</script>
